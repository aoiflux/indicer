<svg width="700" height="240" viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0b1220" />
            <stop offset="45%" stop-color="#11325c" />
            <stop offset="100%" stop-color="#157f73" />
        </linearGradient>
        <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e293b" stop-opacity="0.85" />
            <stop offset="100%" stop-color="#0f172a" stop-opacity="0.4" />
        </linearGradient>
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#22d3ee" />
            <stop offset="100%" stop-color="#34d399" />
        </linearGradient>
        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <rect width="700" height="240" rx="18" fill="url(#bgGradient)" />
    <circle cx="628" cy="40" r="68" fill="#38bdf8" opacity="0.08" />
    <circle cx="64" cy="208" r="52" fill="#34d399" opacity="0.11" />

    <g transform="translate(26, 26)">
        <rect width="648" height="188" rx="16" fill="url(#cardGradient)" stroke="#67e8f9"
            stroke-opacity="0.28" />

        <g transform="translate(24, 34)">
            <rect x="0" y="0" width="142" height="96" rx="14" fill="#0b1d33" stroke="#38bdf8"
                stroke-opacity="0.45" />

            <g transform="translate(16, 16)" filter="url(#softGlow)">
                <ellipse cx="55" cy="56" rx="45" ry="12" fill="#0f766e" opacity="0.45" />
                <rect x="10" y="18" width="90" height="38" rx="9" fill="#164e63" opacity="0.65" />
                <ellipse cx="55" cy="18" rx="45" ry="12" fill="url(#accentGradient)" />
                <circle cx="55" cy="18" r="6" fill="#ecfeff" opacity="0.9" />
            </g>

            <rect x="20" y="74" width="102" height="14" rx="7" fill="#111827" stroke="#34d399"
                stroke-opacity="0.65" />
            <rect x="26" y="77" width="90" height="8" rx="4" fill="url(#accentGradient)"
                opacity="0.88" />
        </g>

        <g transform="translate(202, 44)">
            <text x="0" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="56"
                font-weight="800" letter-spacing="1.5" fill="#f8fafc">
                DUES
            </text>
            <text x="0" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="14"
                fill="#bae6fd" opacity="0.95">
                Deduplicated Unified Evidence Store
            </text>
        </g>

        <g transform="translate(202, 132)">
            <rect x="0" y="0" width="84" height="28" rx="14" fill="#059669" />
            <text x="42" y="14" dominant-baseline="middle" font-family="Segoe UI, Arial, sans-serif"
                font-size="14" font-weight="700" fill="#ecfeff" text-anchor="middle">
                v0.37
            </text>

            <rect x="96" y="0" width="296" height="28" rx="14" fill="#0f172a" stroke="#22d3ee"
                stroke-opacity="0.55" />
            <text x="244" y="14" dominant-baseline="middle"
                font-family="Consolas, Courier New, monospace"
                font-size="13" fill="#67e8f9" text-anchor="middle">
                &lt;starfruit&gt; spacebar
            </text>
        </g>

        <g transform="translate(572, 38)">
            <circle cx="22" cy="22" r="18" fill="none" stroke="#67e8f9" stroke-width="3" />
            <line x1="34" y1="34" x2="48" y2="48" stroke="#67e8f9" stroke-width="3"
                stroke-linecap="round" />
            <path d="M 15 23 L 20 28 L 30 17" fill="none" stroke="#34d399" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round" />
        </g>
    </g>
</svg>